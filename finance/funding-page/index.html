<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Berlin - Investor Information</title>
  <style>
    :root {
      --bg: #f5efe4;
      --bg-deep: #e8e2d7;
      --panel: rgba(255, 255, 255, 0.84);
      --ink: #10202e;
      --muted: #5e6b75;
      --line: rgba(16, 32, 46, 0.12);
      --accent: #0f6b73;
      --accent-soft: rgba(15, 107, 115, 0.12);
      --accent-2: #d47a32;
      --shadow: 0 18px 50px rgba(16, 32, 46, 0.10);
      --radius-lg: 28px;
      --radius-md: 18px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, rgba(15, 107, 115, 0.16), transparent 22rem),
        radial-gradient(circle at top left, rgba(212, 122, 50, 0.14), transparent 18rem),
        linear-gradient(180deg, #f8f4ed 0%, var(--bg) 42%, var(--bg-deep) 100%);
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
      line-height: 1.55;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(16, 32, 46, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(16, 32, 46, 0.035) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.36), transparent 82%);
      pointer-events: none;
      z-index: -1;
    }

    h1 {
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    .container {
      text-align: center;
      padding: 40px;
    }

    .tagline {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: var(--muted);
      max-width: 500px;
      margin: 0 auto 48px;
    }

    .buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 20px 36px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      color: var(--ink);
      font-size: 1.1rem;
      font-weight: 600;
      text-decoration: none;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 24px 60px rgba(16, 32, 46, 0.15);
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--accent), #0a5159);
      color: #fff;
      border: none;
    }

    .btn.primary:hover {
      box-shadow: 0 16px 50px rgba(15, 107, 115, 0.35);
    }

    .btn svg {
      width: 22px;
      height: 22px;
    }

    @media (max-width: 500px) {
      .buttons {
        flex-direction: column;
        align-items: center;
      }

      .btn {
        width: 100%;
        max-width: 280px;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Agent Berlin</h1>
    <p class="tagline">Investor information for our pre-seed raise</p>
    <div class="buttons">
      <a href="deck.html" class="btn primary">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z" />
        </svg>
        Pitch Deck
      </a>
      <a href="details.html" class="btn">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        Full Details
      </a>
    </div>
  </div>
</body>
</html>
